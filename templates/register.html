<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-page">

    <div class="login-container">
        <h2>Employee Register</h2>
        <form method="POST" action="/register" onsubmit="return validatePassword()">
            <input type="text" name="name" placeholder="Enter Name" required>
            <input type="text" name="role" placeholder="Enter Role (e.g., Analyst, Manager)" required>
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <div id="errorModal" class="modal{% if error %} show{% endif %}">
        <div class="modal-content">
            <p>{{ error }}</p>
            <button type="button" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        function validatePassword() {
            const password = document.querySelector('input[name="password"]').value;
            if (password.length <= 8) {
                alert("Password must be more than 8 characters");
                return false;
            }
            const specialCharRegex = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/;
            if (!specialCharRegex.test(password)) {
                alert("Password must contain at least one special character");
                return false;
            }
            return true;
        }
        function closeModal() {
            document.getElementById('errorModal').classList.remove('show');
        }    </script>

</body>

</html>
