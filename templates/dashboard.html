<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="header">
        <div class="logo">Customer Churn Predictor</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/dashboard_view">Dashboard View</a>
        </div>
    </div>

    <div class="dashboard-form-page">
        <div class="dashboard-form-container">
            <h2>Enter Customer Details</h2>
            <p class="form-description">Fill in the customer information below to predict churn probability.</p>

            <form action="/predict" method="POST">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="customerName">Customer Name</label>
                        <input id="customerName" type="text" name="customerName" placeholder="Enter customer name"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="tenure">Tenure (months)</label>
                        <input id="tenure" type="number" name="tenure" placeholder="e.g., 12" required>
                    </div>

                    <div class="form-group">
                        <label for="MonthlyCharges">Monthly Charges ($)</label>
                        <input id="MonthlyCharges" type="number" step="0.01" name="MonthlyCharges"
                            placeholder="e.g., 65.50" required>
                    </div>

                    <div class="form-group">
                        <label for="Contract">Contract Type</label>
                        <select id="Contract" name="Contract">
                            <option value="Month-to-month">Month-to-month</option>
                            <option value="One year">One year</option>
                            <option value="Two year">Two year</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="PaymentMethod">Payment Method</label>
                        <select id="PaymentMethod" name="PaymentMethod">
                            <option value="Electronic check">Electronic check</option>
                            <option value="Mailed check">Mailed check</option>
                            <option value="Credit card (automatic)">Credit card (automatic)</option>
                            <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="InternetService">Internet Service</label>
                        <select id="InternetService" name="InternetService">
                            <option value="Fiber optic">Fiber optic</option>
                            <option value="DSL">DSL</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="HasInternet">Has Internet Service</label>
                        <select id="HasInternet" name="HasInternet">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="TechSupport">Tech Support</label>
                        <select id="TechSupport" name="TechSupport">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="OnlineSecurity">Online Security</label>
                        <select id="OnlineSecurity" name="OnlineSecurity">
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="predict-btn">Predict Churn Risk</button>
            </form>
        </div>
    </div>
</body>

</html>
