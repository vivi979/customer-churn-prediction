<!DOCTYPE html>
<html>

<head>
    <title>Result</title>
</head>

<body>

    <h2>Prediction Result</h2>

    <p>Churn Probability: {{ prediction }}</p>

    {% if prediction > 0.5 %}
    <p style="color:red;">High Risk Customer ⚠️</p>
    {% else %}
    <p style="color:green;">Low Risk Customer ✅</p>
    {% endif %}

    <a href="/dashboard">Check Another</a>

</body>

</html>
